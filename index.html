<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أعمال دلال</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; text-align: center; }
        header { background: #007bff; color: white; padding: 40px 20px; }
        .btn { background: #25d366; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; display: inline-block; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #128c7e; transform: scale(1.05); }
        .projects-section { padding: 50px 20px; }
        .projects-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .project-card { background: white; border: 1px solid #ddd; border-radius: 15px; width: 300px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .project-card img { width: 100%; border-radius: 10px; height: 200px; object-fit: cover; }
        h2 { color: #333; margin-bottom: 30px; }
    </style>
</head>
<body>

    <header>
        <h1>مرحباً بكم في معرض أعمالي 🌟</h1>
        <p>أنا دلال، مبرمجة ومصممة مشاريع احترافية.</p>
        <a href="https://wa.me/213673824053" class="btn">اطلب مشروعك الآن ($150)</a>
    </header>

    <section class="projects-section">
        <h2>أبرز مشاريعي 🎨</h2>
        <div class="projects-grid">

            <div class="project-card">
                <img src="project1.jpg" alt="مشروع 1">
                <h3>اسم المشروع الأول</h3>
                <p>وصف قصير هنا.. مثلاً: تصميم متجر إلكتروني احترافي.</p>
            </div>

            <div class="project-card">
                <img src="project2.jpg" alt="مشروع 2">
                <h3>اسم المشروع الثاني</h3>
                <p>وصف قصير هنا.. مثلاً: إدارة حسابات السوشيال ميديا.</p>
            </div>

        </div>
    </section>

    <footer style="padding: 20px; color: #777;">
        <p>© 2026 جميع الحقوق محفوظة لدلال</p>
    </footer>

</body>
</html>
