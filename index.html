<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalal | Professional Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; text-align: center; color: #333; }
        header { background: #1a1a1a; color: white; padding: 60px 20px; }
        .btn { background: #25d366; color: white; padding: 15px 35px; text-decoration: none; border-radius: 50px; display: inline-block; font-weight: bold; margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn:hover { background: #128c7e; transform: translateY(-3px); }
        .projects-section { padding: 60px 20px; }
        .projects-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .project-card { background: white; border-radius: 15px; width: 320px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
        .project-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .project-card img { width: 100%; border-radius: 10px; height: 200px; object-fit: cover; margin-bottom: 15px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        h2 { font-size: 2rem; margin-bottom: 40px; color: #1a1a1a; }
        footer { padding: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
